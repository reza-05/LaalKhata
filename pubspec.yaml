name: laalkhata
description: IUT-focused money management app for Android, iOS, and web-ready Flutter builds.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  google_fonts: ^6.3.0
  supabase_flutter: ^2.8.3
  crypto: ^3.0.7
  local_auth: ^3.0.1
  flutter_secure_storage: ^10.3.1
  drift: ^2.34.0
  drift_flutter: ^0.3.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  drift_dev: ^2.34.0
  build_runner: ^2.15.0

flutter:
  uses-material-design: true
  assets:
    - assets/brand/
    - assets/providers/
